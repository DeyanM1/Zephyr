name: ci
on:
  push:
    branches:
      - master
      - main
    paths:
        - "docs/**" 
  workflow_dispatch: 

    
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
          
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ github.run_number }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material mkdocs-awesome-pages-plugin
      - run: mkdocs gh-deploy --force
      
      - name: Build Zim documentation
        run: |
          docker run \
          --network host \
            -v ./dist/docs:/output \
            ghcr.io/openzim/zimit \
              zimit \
                --seeds https://deyan.is-a.dev/Zephyr/ \
                --name ZephyrDocs \
                --title "Zephyr Documentation" \
                --creator "DeyanM1" \
                --publisher "DeyanM1" \
                --lang "en" \
                --description "Full documentation of the Zephyr programming Language by DeyanM1" 

          mv ./dist/docs/ZephyrDocs*.zim ./dist/docs/ZephyrDocs.zim

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zephyr Documentation
          path: |
            ./dist/docs/ZephyrDocs.zim
          archive: false
