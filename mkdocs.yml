site_name: Zephyr Documentation
site_url: https://deyan.is-a.dev/Zephyr
repo_url: https://github.com/DeyanM1/Zephyr
repo_name: DeyanM1/Zephyr


theme:
  name: material
  font:
    text: Source Sans 3
    code: JetBrains Mono
  icon:
      repo: fontawesome/brands/github
  logo: assets/img/logo.svg
  favicon: assets/img/favicon.ico
  features:
    - search.suggest
    - search.highlight
  palette: 
    - scheme: slate
      toggle:
        icon: material/brightness-percent
        name: Switch to Light Mode
      primary: black
      accent: black
      
  # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to Alternate Mode
      primary: pink
      accent: deep purple

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to OLED Mode
      primary: purple
      accent: pink

    

extra_css: 
  - assets/stylesheets/extra.css

markdown_extensions:
  - pymdownx.betterem
  - attr_list
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

  - admonition
  - pymdownx.details

plugins:
  - awesome-pages
  - search
